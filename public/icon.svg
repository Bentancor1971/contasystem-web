<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#230d66"/>
      <stop offset="100%" style="stop-color:#0892d9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e57c15"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Accent bar -->
  <rect x="80" y="340" width="352" height="6" rx="3" fill="url(#accent)"/>
  <!-- Letter C -->
  <text x="138" y="310" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="260" fill="white" letter-spacing="-8">C</text>
  <!-- Letter S -->
  <text x="280" y="310" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="260" fill="rgba(255,255,255,0.85)" letter-spacing="-8">S</text>
  <!-- Small text "contasystem" -->
  <text x="256" y="400" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="42" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="6">CONTASYSTEM</text>
</svg>
